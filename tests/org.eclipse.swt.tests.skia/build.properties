source..=JUnit Tests/
output.. = bin/
bin.includes = .,\
               META-INF/

# The following dependency prevents parallel execution of this and the referenced test-project. 
# Both use the same not-shareable resources and therefore cannot run in parallel. 

pom.model.packaging = eclipse-test-plugin
pom.model.property.testClass = org.eclipse.swt.tests.skia.AllSkiaTests
jars.extra.classpath = platform:/plugin/org.eclipse.swt.skia/lib/skija-linux-x64-0.143.11.jar,\
                       platform:/plugin/org.eclipse.swt.skia/lib/skija-shared-0.143.11.jar,\
                       platform:/plugin/org.eclipse.swt.skia/lib/skija-windows-x64-0.143.11.jar,\
                       platform:/plugin/org.eclipse.swt.skia/lib/types-0.1.1.jar
